<!doctype html>
<html>
  <head>
    <title>Lapor Sampah</title>
  </head>
  <body>
    <h2>Lapor web Sampah</h2>

    <form id="form">
      Lokasi: <input type="text" name="lokasi" /><br /><br />
      Deskripsi: <input type="text" name="deskripsi" /><br /><br />
      Foto: <input type="file" name="foto" /><br /><br />
      <button type="submit">Kirim</button>
    </form>

    <script>
      document.getElementById("form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        try {
          const response = await fetch("http://YOUR_EC2_IP:3000/laporan", {
            method: "POST",
            body: formData,
          });

          const rawBody = await response.text();
          let payload = {};

          if (rawBody) {
            try {
              payload = JSON.parse(rawBody);
            } catch {
              throw new Error(rawBody);
            }
          }

          if (!response.ok) {
            throw new Error(payload.message || `Request gagal (${response.status})`);
          }

          alert(payload.message || "Laporan terkirim!");
          this.reset();
        } catch (error) {
          console.error(error);
          alert(error.message || "Terjadi kesalahan saat kirim laporan");
        }
      });
    </script>
  </body>
</html>
